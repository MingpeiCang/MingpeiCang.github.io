{{- $title := .Get "title" | default "Project videos" -}}
{{- $intro := .Get "intro" -}}
<div class="project-video-gallery" style="margin: 1.5rem 0 2rem;">
  <h3 style="margin-bottom: 0.6rem;">{{ $title }}</h3>
  {{- with $intro }}
  <p style="margin-bottom: 1rem; color: #555;">{{ . }}</p>
  {{- end }}
  <div style="display:grid; grid-template-columns:repeat(auto-fit,minmax(220px,1fr)); gap:1rem; align-items:start;">
    {{- range $i := seq 1 3 }}
      {{- $src := $.Get (printf "src%d" $i) -}}
      {{- $caption := $.Get (printf "caption%d" $i) -}}
      {{- if $src }}
      <figure style="margin:0; padding:0.85rem; border:1px solid #e8e8e8; border-radius:12px; background:#fafafa;">
        <video controls playsinline preload="metadata" style="width:100%; border-radius:8px; background:#000; display:block;">
          <source src="{{ $src | relURL }}" type="video/mp4">
          Your browser does not support the video tag.
        </video>
        {{- with $caption }}
        <figcaption style="margin-top:0.6rem; font-size:0.95rem; color:#555; text-align:center;">{{ . }}</figcaption>
        {{- end }}
      </figure>
      {{- end }}
    {{- end }}
  </div>
</div>
